name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: develop
    # Only run on merge commits — not direct pushes or bot commits
    if: |
      github.event.head_commit.message != '' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (
        startsWith(github.event.head_commit.message, 'Merge branch') ||
        startsWith(github.event.head_commit.message, 'Merge pull request')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Version, Build and Publish
        run: |
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)

          if [ -z "$CHANGESETS" ]; then
            MERGE_BRANCH=$(git log -1 --pretty=format:"%s" | sed -n "s/Merge branch '\([^']*\)'.*/\1/p")

            if [ -z "$MERGE_BRANCH" ]; then
              echo "No changesets and no merge commit detected — nothing to publish."
              exit 0
            fi

            if [[ "$MERGE_BRANCH" == release/* ]]; then
              BUMP="major"
            elif [[ "$MERGE_BRANCH" == feat/* || "$MERGE_BRANCH" == feature/* ]]; then
              BUMP="minor"
            else
              BUMP="patch"
            fi

            PKG_NAME=$(node -p "require('./packages/components/package.json').name")
            echo "No changeset found — creating $BUMP bump from merged branch: $MERGE_BRANCH"
            {
              echo "---"
              echo "\"$PKG_NAME\": $BUMP"
              echo "---"
              echo ""
              echo "$BUMP bump from branch \`$MERGE_BRANCH\`"
            } > .changeset/auto-release.md
          fi

          npx changeset version
          npm run build
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          npm run release

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: version packages [skip ci]"
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}