name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Version, Build and Publish
        run: |
          # Check for pending changesets (ignore README.md)
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)

          if [ -z "$CHANGESETS" ]; then
            echo "No changesets found — nothing to publish."
            exit 0
          fi

          echo "Changesets found:"
          echo "$CHANGESETS"

          # 1. Bump versions + update CHANGELOG based on changesets
          npx changeset version

          # 2. Build dist/ with the new version
          npm run build

          # 3. Publish to npm
          npm run release

          # 4. Commit the version bumps and push back to master
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: version packages [skip ci]"
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
