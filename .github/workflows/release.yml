name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Version, Build and Publish
        run: |
          # If no changeset exists, auto-create one from the merge commit source branch
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)

          if [ -z "$CHANGESETS" ]; then
            MERGE_BRANCH=$(git log -1 --pretty=format:"%s" | sed -n "s/Merge branch '\([^']*\)'.*/\1/p")

            if [ -z "$MERGE_BRANCH" ]; then
              echo "No changesets and no merge commit detected — nothing to publish."
              exit 0
            fi

            # Determine bump type from branch prefix
            if [[ "$MERGE_BRANCH" == release/* ]]; then
              BUMP="major"
            elif [[ "$MERGE_BRANCH" == feat/* || "$MERGE_BRANCH" == feature/* ]]; then
              BUMP="minor"
            else
              BUMP="patch"
            fi

            PKG_NAME=$(node -p "require('./packages/components/package.json').name")
            echo "No changeset found — creating $BUMP bump from merged branch: $MERGE_BRANCH"
            {
              echo "---"
              echo "\"$PKG_NAME\": $BUMP"
              echo "---"
              echo ""
              echo "$BUMP bump from branch \`$MERGE_BRANCH\`"
            } > .changeset/auto-release.md
          fi

          # 1. Bump versions + update CHANGELOG based on changesets
          npx changeset version

          # 2. Build dist/ with the new version
          npm run build

          # 3. Publish to npm
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          npm run release

          # 4. Commit the version bumps and push back to master
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: version packages [skip ci]"
          git push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
