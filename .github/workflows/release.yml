name: Release

on:
  push:
    branches: [master]
    

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: develop
    # Only run on merge commits — not direct pushes or bot commits
    if: |
      github.event.head_commit.message != '' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (
        startsWith(github.event.head_commit.message, 'Merge branch') ||
        startsWith(github.event.head_commit.message, 'Merge pull request')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Run tests
        run: npm run test --workspace=packages/components

      - name: Version, Build and Publish
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # Extract merged branch name — support both GitHub merge commit formats:
          #   "Merge branch 'feat/xxx' into master"
          #   "Merge pull request #N from user/feat/xxx"
          MERGED_BRANCH=$(echo "$COMMIT_MSG" | sed -n "s/Merge branch '\([^']*\)'.*/\1/p")
          if [ -z "$MERGED_BRANCH" ]; then
            MERGED_BRANCH=$(echo "$COMMIT_MSG" | sed -n "s|Merge pull request #[0-9]* from [^/]*/\(.*\)|\1|p")
          fi

          if [ -z "$MERGED_BRANCH" ]; then
            echo "Could not detect merged branch from commit message: $COMMIT_MSG"
            echo "Nothing to publish."
            exit 0
          fi

          echo "Merged branch: $MERGED_BRANCH"

          # Determine bump type from branch prefix
          if [[ "$MERGED_BRANCH" == breaking/* ]]; then
            BUMP="major"
          elif [[ "$MERGED_BRANCH" == feat/* || "$MERGED_BRANCH" == feature/* ]]; then
            BUMP="minor"
          elif [[ "$MERGED_BRANCH" == fix/* || "$MERGED_BRANCH" == bugfix/* || "$MERGED_BRANCH" == hotfix/* ]]; then
            BUMP="patch"
          elif [[ "$MERGED_BRANCH" == refactor/* || "$MERGED_BRANCH" == chore/* || "$MERGED_BRANCH" == docs/* || "$MERGED_BRANCH" == style/* || "$MERGED_BRANCH" == test/* || "$MERGED_BRANCH" == perf/* || "$MERGED_BRANCH" == ci/* ]]; then
            BUMP="patch"
          else
            echo "Branch '$MERGED_BRANCH' does not match any release prefix — nothing to publish."
            exit 0
          fi

          echo "Bump type: $BUMP"

          # Get the latest git tag (vX.Y.Z format)
          VERSION=$(node -p "require('./packages/components/package.json').version")
          echo "Current version from package.json: $VERSION"

          # Parse current version
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Compute new version
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "New version: $NEW_TAG"

          # Update package.json version (no git commit from npm version)
          npm version "$NEW_VERSION" --workspace=packages/components --no-git-tag-version

          # Build
          npm run build --workspace=packages/components

          # Publish to npm
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          npm publish --workspace=packages/components --access public

          # Commit version bump and tag
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/components/package.json
          git diff --staged --quiet || git commit -m "chore: release $NEW_TAG [skip ci]"
          git tag "$NEW_TAG"
          git push
          git push origin "$NEW_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
