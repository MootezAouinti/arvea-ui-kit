name: Auto Changeset

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  auto-changeset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the pushed commit triggers downstream CI
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create changeset from branch name
        run: node scripts/create-changeset.mjs "${{ github.head_ref }}"

      - name: Commit changeset (if created)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          # Only commit if there is something staged
          git diff --cached --quiet || \
            git commit -m "chore: auto-changeset for \`${{ github.head_ref }}\`"
          git push
