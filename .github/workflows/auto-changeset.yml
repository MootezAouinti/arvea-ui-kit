name: Auto Changeset

on:
  push:
    branches:
      - 'feat/**'
      - 'feature/**'
      - 'fix/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'release/**'

permissions:
  contents: write

jobs:
  auto-changeset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create changeset from branch name
        run: node scripts/create-changeset.mjs "${{ github.ref_name }}"

      - name: Commit and push changeset (if new)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git diff --cached --quiet || git commit -m "chore: auto-changeset [skip ci]"
          git push
